services:
  taskflow-api:
    image: node:18
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    # 终极修复：安装 Debian 编译环境并强制重构 sqlite3
    command: sh -c "apt-get update && apt-get install -y build-essential python3 && npm install && npm rebuild sqlite3 --build-from-source && node server.js"